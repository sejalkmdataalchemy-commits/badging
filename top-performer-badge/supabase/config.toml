# Minimal local Supabase configuration for the badge-engine edge function.
# This keeps the project lightweight while still allowing `supabase functions serve` to run.

project_id = "badge-engine-local"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[functions.top-performer-badging]
verify_jwt = false
